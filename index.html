<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      content="width=device-width, user-scalable=no, initial-scale=1.0"
      name="viewport"
    />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Around The U.S</title>
    <link href="./pages/index.css" rel="stylesheet" />
  </head>
  <body class="page">
    <div>
      <header class="header">
        <img
          src="./images/Around-the-us_logo.svg"
          alt="Around The U.S logo"
          class="header__logo"
        />
      </header>
      <main class="content">
        <section class="profile">
          <img
            src="./images/jacques-cousteau.jpg"
            alt="avatar"
            class="profile__avatar"
          />
          <div class="profile__info">
            <h1 class="profile__title">
              Jacques Cousteau ddddddddddddddddddddd
            </h1>
            <button class="profile__edit-button" type="button"></button>
            <p class="profile__subtitle">explorer ddddddddddddddddddddd</p>
          </div>
          <button class="profile__add-button" type="button"></button>
        </section>
        <section class="cards">
          <ul class="cards__list">
            <li class="cards__display">
              <img
                src="./images/yosemite.jpg"
                alt="Yosemite Valley"
                class="cards__image"
              />
              <div class="cards__title">
                <h2 class="cards__text">Yosemite Valley</h2>
                <button class="cards__like-button" type="Button"></button>
              </div>
            </li>
            <li class="cards__display">
              <img
                src="./images/lake-louise.jpg"
                alt="Lake Louise"
                class="cards__image"
              />
              <div class="cards__title">
                <h2 class="cards__text">Lake Louise</h2>
                <button class="cards__like-button" type="button"></button>
              </div>
            </li>
            <li class="cards__display">
              <img
                src="./images/bald-mountains.jpg"
                alt="Bald Mountains"
                class="cards__image"
              />
              <div class="cards__title">
                <h2 class="cards__text">Bald Mountains</h2>
                <button class="cards__like-button" type="button"></button>
              </div>
            </li>
            <li class="cards__display">
              <img
                src="./images/latemar.jpg"
                alt="Latemar"
                class="cards__image"
              />
              <div class="cards__title">
                <h2 class="cards__text">Latemar</h2>
                <button class="cards__like-button" type="button"></button>
              </div>
            </li>
            <li class="cards__display">
              <img
                src="./images/vanoise.jpg"
                alt="Vanoise National Park"
                class="cards__image"
              />
              <div class="cards__title">
                <h2 class="cards__text">Vanoise National Park</h2>
                <button class="cards__like-button" type="button"></button>
              </div>
            </li>
            <li class="cards__display">
              <img
                src="./images/lago.jpg"
                alt="Lago di Braies"
                class="cards__image"
              />
              <div class="cards__title">
                <h2 class="cards__text">Lago di Braies</h2>
                <button class="cards__like-button" type="button"></button>
              </div>
            </li>
          </ul>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__copyright">&copy;2024 Around The U.S.</p>
      </footer>
    </div>

    <script src="./scripts/index.js"></script>
  </body>
</html>
