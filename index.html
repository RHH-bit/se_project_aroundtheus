<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      content="width=device-width, user-scalable=no, initial-scale=1.0"
      name="viewport"
    />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Around The U.S</title>
    <link href="./pages/index.css" rel="stylesheet" />
  </head>
  <body class="page">
    <div>
      <header class="header">
        <img
          src="./images/Around-the-us_logo.svg"
          alt="Around The U.S logo"
          class="header__logo"
        />
      </header>
      <main class="content">
        <section class="profile">
          <img
            src="./images/jacques-cousteau.jpg"
            alt="avatar"
            class="profile__avatar"
          />
          <div class="profile__info">
            <h1 class="profile__title">Jacques Cousteau</h1>
            <button
              class="profile__edit-button"
              id="profile-edit-button"
              type="button"
            ></button>
            <p class="profile__subtitle">explorer</p>
          </div>
          <button class="profile__add-button" type="button"></button>
        </section>
        <section class="cards">
          <ul class="cards__list"></ul>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__copyright">&copy;2024 Around The U.S.</p>
      </footer>
    </div>

    <div class="modal" id="profile-edit-modal">
      <div class="modal__container">
        <button
          class="modal__close"
          id="modal-profile-close-button"
          type="button"
        ></button>
        <p class="modal__header">Edit profile</p>
        <form class="modal__form" id="profile-edit-form">
          <input
            type="text"
            class="modal__input"
            id="profile-title-input"
            name="title"
            placeholder="Name"
            minlength="2"
            maxlength="40"
            required
          />
          <span class="modal__error" id="profile-title-input-error"></span>
          <input
            type="text"
            class="modal__input"
            id="profile-subtitle-input"
            name="subtitle"
            placeholder="Job"
            minlength="2"
            maxlength="200"
            required
          />
          <span class="modal__error" id="profile-subtitle-input-error"></span>
          <button class="modal__button" type="submit">Save</button>
        </form>
      </div>
    </div>

    <div class="modal" id="add-card-modal">
      <div class="modal__container">
        <button
          class="modal__close"
          id="modal-add-card-close-button"
          type="button"
        ></button>
        <p class="modal__header">New Place</p>
        <form class="modal__form" id="add-card-form">
          <input
            type="text"
            class="modal__input"
            id="new-card-title-input"
            name="name"
            placeholder="Title"
            minlength="1"
            maxlength="30"
            required
          />
          <span class="modal__error" id="new-card-title-input-error"></span>
          <input
            type="url"
            class="modal__input"
            id="new-card-link-input"
            name="subtitle"
            placeholder="Image link"
            required
          />
          <span class="modal__error" id="new-card-link-input-error"></span>
          <button class="modal__button modal__button_disabled" type="submit" disabled>Save</button>
        </form>
      </div>
    </div>

    <div class="modal modal_type_perviewer" id="modal-previewer">
      <div class="modal__perviewer-image">
        <button
          class="modal__close modal__perviewer-close-button"
          id="modal-previewer-close-button"
          type="button"
        ></button>
        <img
          src=""
          alt=""
          class="modal__perviewer-image-full"
          id="modal__image-perview"
        />
        <p class="modal__perviewer-text"></p>
      </div>
    </div>

    <template id="card-template">
      <li class="cards__display">
        <div class="cards__delete-button_display">
          <img
            src="./images/Trash.svg"
            alt="Trash"
            class="cards__delete-button"
          />
          <img src="" alt="" class="cards__image" />
        </div>
        <div class="cards__title">
          <h2 class="cards__text"></h2>
          <button class="cards__like-button" type="button"></button>
        </div>
      </li>
    </template>

    <script src="./scripts/index.js"></script>
    <script src="./scripts/validation.js"></script>
  </body>
</html>
